name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      # Os testes de ObjectDetector carregam o modelo YOLOv5 real (pesos + torch),
      # entao ficam para execucao local. No CI rodamos os testes unit puros.
      - name: Run tests
        run: pytest tests/ -k "not TestObjectDetector" -q